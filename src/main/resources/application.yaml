spring:
  application:
    name: E-commerce-backend

  jackson:
    default-property-inclusion: non-null

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000
  refresh-expiration: 604800000

app:
  email:
    enabled: true
    from: ${MAIL_FROM}
    subject-prefix: "[E-commerce-backend]"
    api-key: ${RESEND_API_KEY}
    api-base-url: ${RESEND_API_BASE_URL:https://api.resend.com}

  cloudinary:
    cloud_name: ${CLOUDINARY_CLOUD_NAME}
    api_key: ${CLOUDINARY_API_KEY}
    api_secret: ${CLOUDINARY_API_SECRET}